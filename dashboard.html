<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker | Dashboard</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- Tailwind CSS & Daisy UI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style>
      * {
        font-family: "Geist", sans-serif;
        /* background-color: #f8fafc; */
      }
    </style>
  </head>
  <body class="bg-[#F8FAFC] h-screen">
    <!-- Navbar -->
    <nav
      class="flex justify-between items-center p-5 px-10 bg-[#FFFFFF] rounded-lg shadow-sm mb-5"
    >
      <div class="flex items-center">
        <img
          src="./images/github-logo.png"
          alt="githubLogo"
          class="w-10 h-10 inline-block"
        />
        <span class="text-2xl font-bold ml-2">GitHub Issues Tracker</span>
      </div>

      <div class="flex items-center gap-4">
        <!-- Search Bar -->
        <!-- put a icon right before search issues placeholder-->
        <div class="relative">
          <!-- icon -->
          <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">
            <img src="./images/MagnifyingGlass.png" alt="" />
          </span>

          <!-- input -->
          <input
            type="text"
            placeholder="Search Issues..."
            class="border border-[#E4E4E7] rounded-md pl-10 pr-4 py-4"
          />
        </div>

        <!-- Button  -->
        <button
          type="submit"
          id="newIssueBtn"
          class="bg-[#4A00FF] text-white rounded-md font-semibold cursor-pointer px-[16px] py-[16px] flex items-center gap-[8px]"
        >
          <img src="./images/Plus.png" alt="" />
          New Issue
        </button>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="mx-auto max-w-[1400px]">
      <!-- Top Buttons -->
      <div
        class="bg-[#FFFFFF] rounded-lg shadow-sm p-5 mb-5 flex justify-start"
      >
        <div class="flex gap-2">
          <button
            class="bg-[#4A00FF] text-white rounded-sm px-[40px] py-[8px] cursor-pointer"
          >
            All
          </button>
          <button
            class="bg-[#4A00FF] text-white rounded-sm px-[40px] py-[8px] cursor-pointer"
          >
            Open
          </button>
          <button
            class="bg-[#4A00FF] text-white rounded-sm px-[40px] py-[8px] cursor-pointer"
          >
            Closed
          </button>
        </div>
      </div>

      <!-- Issues List Top Bar -->
      <div
        class="bg-[#FFFFFF] rounded-lg shadow-sm p-5 mb-5 flex justify-between gap-5 items-center"
      >
        <div class="flex justify-center items-center gap-5">
          <img
            src="./images/Aperture.png"
            alt="logo"
            class="bg-[#ECE4FF] rounded-[50%] p-2"
          />
          <div>
            <!-- Ekhane Dynamically issues show korte hobe -->
            <h1>50 Issues</h1>
            <p>Track and manage your project issues</p>
          </div>
        </div>

        <div class="flex justify-center items-center gap-5 font-semibold">
          <!-- Green Dot -->
          <div class="flex justify-center items-center gap-2">
            <div class="bg-[#00A96E] w-4 h-4 rounded-full"></div>
            Open
          </div>
          <!-- Purple Dot -->
          <div class="flex justify-center items-center gap-2">
            <div class="bg-[#A96EFF] w-4 h-4 rounded-full"></div>
            Closed
          </div>
        </div>
      </div>

      <!-- Issues are shown here in Grid Cards -->
      <div class="grid grid-cols-4 gap-5">
        <!-- Indivisual Card -->
        <div class="card">
          <div
            class="w-full max-w-sm border border-gray-200 rounded-xl p-4 bg-white shadow-sm"
          >
            <!-- Top Section -->
            <div class="flex items-start justify-between mb-3">
              <!-- Icon -->
              <img src="./images/Open-Status.png" alt="" />

              <!-- Priority Badge -->
              <span
                class="text-xs font-semibold px-3 py-1 rounded-full bg-red-100 text-red-500"
              >
                HIGH
              </span>
            </div>

            <!-- Title -->
            <h2 class="text-lg font-semibold text-gray-800 leading-snug">
              Fix Navigation Menu On Mobile Devices
            </h2>

            <!-- Description -->
            <p class="text-sm text-gray-500 mt-2">
              The navigation menu doesn't collapse properly on mobile devices...
            </p>

            <!-- Tags -->
            <div class="flex gap-2 mt-4">
              <span
                class="flex gap-1 text-xs px-3 py-1 rounded-full border border-red-300 text-red-500 bg-red-50"
              >
                <img src="./images/BugDroid.png" alt="" /> BUG
              </span>
              <span
                class="flex gap-1 text-xs px-3 py-1 rounded-full border border-yellow-300 text-yellow-600 bg-yellow-50 text-nowrap"
              >
                <img src="./images/Lifebuoy.png" alt="" /> HELP WANTED
              </span>
            </div>

            <!-- Footer -->
            <div class="mt-4 pt-3 border-t text-xs text-gray-400">
              <p>#1 by john_doe</p>
              <p>1/15/2024</p>
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
