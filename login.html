<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- Tailwind CSS & Daisy UI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style>
      * {
        font-family: "Geist", sans-serif;
        background-color: #f8fafc;
      }
    </style>
  </head>
  <body>
    <div class="max-w-2xl mx-auto bg-[#FFFFFF] mt-20 rounded-lg shadow-lg">
      <!-- The Starter Portion -->
      <div
        class="flex justify-center items-center flex-col pt-[32px] pr-[32px] pl-[32px] mb-[24px]"
      >
        <img src="images/github-logo.png" alt="GitHubLogo" />
        <h1 class="text-[24px] font-semibold mt-[24px] mb-[4px]">
          GitHub Issues Tracker
        </h1>
        <p class="text-[#64748B] text-[16px]">Sign in to manage your issues</p>
      </div>

      <!-- The Form Portion -->
      <div>
        <form class="flex flex-col ml-[32px] mr-[32px]">
          <label
            for="username"
            class="text-[#1F2937] text-[16px] font-semibold mt-[24px] mb-[8px]"
            >Username</label
          >
          <input
            type="text"
            id="username"
            placeholder="Enter Username"
            class="mb-[6px] border-[#E4E4E7] border-[1px] rounded-md p-2"
          />
          <p class="text-[#4A00FF] text-[14px]">Default: admin</p>
          <label
            for="password"
            class="text-[#1F2937] text-[16px] font-semibold mt-[16px]"
            >Password</label
          >
          <input
            id="password"
            type="password"
            placeholder="Enter Password"
            class="mb-[6px] border-[#E4E4E7] border-[1px] rounded-md p-2"
          />
          <p class="mb-[24px] text-[#4A00FF] text-[14px]">Default: admin123</p>
          <button type="submit" class="">Sign In</button>
        </form>
      </div>
    </div>

    <!-- JS Script -->
    <script src="script.js"></script>
  </body>
</html>
