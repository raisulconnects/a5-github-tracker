<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- Tailwind CSS & Daisy UI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style>
      * {
        font-family: "Geist", sans-serif;
        /* background-color: #f8fafc; */
      }
    </style>
  </head>
  <body>
    <div class="max-w-1/3 mx-auto bg-[#FFFFFF] mt-20 rounded-lg shadow-lg">
      <!-- The Starter Portion -->
      <div
        class="flex justify-center items-center flex-col pt-[32px] pr-[32px] pl-[32px] mb-[24px]"
      >
        <img src="images/github-logo.png" alt="GitHubLogo" />
        <h1 class="text-[24px] font-semibold mt-[24px] mb-[4px]">
          GitHub Issues Tracker
        </h1>
        <p class="text-[#64748B] text-[16px]">Sign in to manage your issues</p>
      </div>

      <!-- The Form Portion -->
      <div>
        <form class="flex flex-col ml-[32px] mr-[32px]">
          <label
            for="username"
            class="text-[#1F2937] text-[16px] font-semibold mt-[24px] mb-[8px]"
            >Username</label
          >
          <input
            type="text"
            id="username"
            placeholder="Enter Username"
            class="mb-[6px] border-[#E4E4E7] border-[1px] rounded-md p-2"
            required
          />
          <p class="text-[#4A00FF] text-[14px]">Default: admin</p>
          <label
            for="password"
            class="text-[#1F2937] text-[16px] font-semibold mt-[24px] mb-[8px]"
            >Password</label
          >
          <input
            id="password"
            type="password"
            placeholder="Enter Password"
            required
            class="mb-[6px] border-[#E4E4E7] border-[1px] rounded-md p-2"
          />
          <p class="mb-[24px] text-[#4A00FF] text-[14px]">Default: admin123</p>
          <button
            type="submit"
            id="loginBtn"
            class="bg-[#4A00FF] text-white py-2 rounded-md text-semibold cursor-pointer"
          >
            Sign In
          </button>
        </form>
      </div>

      <!-- OR Portion -->
      <div class="flex mt-[24px] p-[32px]">
        <hr class="mt-2 w-1/2 mx-auto text-gray-500" />
        <p class="text-black text-[16px] text-center mx-2">OR</p>
        <hr class="mt-2 w-1/2 mx-auto text-gray-500" />
      </div>

      <!-- Demo Credentails Part -->
      <div
        class="flex flex-col justify-center items-center text-center ml-[32px] mr-[32px]"
      >
        <p class="mb-[8px]">Demo Credentials:</p>
        <div
          class="flex justify-center items-center bg-[#F8FAFC] flex-col w-full py-[24px] mb-[20px]"
        >
          <p class="text-[16px] font-semibold">
            Username: <span class="font-normal">admin</span>
          </p>
          <p class="text-[16px] font-semibold">
            Password: <span class="font-normal">admin123</span>
          </p>
        </div>
      </div>
    </div>

    <!-- JS Script -->
    <script src="script.js"></script>
  </body>
</html>
